<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Off Grid — Mixes</title>
  <!-- Baseline meta + structured data. The app script rewrites these per view
       (see updateSEO) once the manifest loads; these are the no-JS fallback. -->
  <meta name="description" content="Self hosted embedded audio player for DJ mixes and playlists.">
  <meta property="og:site_name" content="Off Grid">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Off Grid — Mixes">
  <meta property="og:description" content="Self hosted embedded audio player for DJ mixes and playlists.">
  <script type="application/ld+json" id="ld-json"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #ff5500;
      --bg: #111;
      --bg2: #161616;
      --text: #f0f0f0;
      --text-muted: #666;
      --border: #2a2a2a;
      --max-w: 720px;
    }

    html,
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 85, 0, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 85, 0, 0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    /* Header */
    .site-header {
      margin-bottom: 64px;
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      display: block;
    }

    .site-title {
      font-size: clamp(36px, 6vw, 54px);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }

    .site-title strong {
      font-weight: 600;
    }

    .site-tagline {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 12px;
      font-weight: 300;
    }

    /* Orange underline accent */
    .accent-line {
      width: 48px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin-top: 20px;
    }

    /* Section headers */
    .section {
      margin-bottom: 64px;
    }

    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Individual player stack */
    .player-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .player-entry {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }

    .player-entry:nth-child(1) {
      animation-delay: 0.05s;
    }

    .player-entry:nth-child(2) {
      animation-delay: 0.12s;
    }

    .player-entry:nth-child(3) {
      animation-delay: 0.19s;
    }

    .player-entry:nth-child(4) {
      animation-delay: 0.26s;
    }

    .player-entry:nth-child(5) {
      animation-delay: 0.33s;
    }

    .player-entry:nth-child(6) {
      animation-delay: 0.40s;
    }

    .player-entry:nth-child(7) {
      animation-delay: 0.47s;
    }

    .player-entry:nth-child(8) {
      animation-delay: 0.54s;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Search bar */
    .search-bar {
      margin-bottom: 24px;
      position: relative;
    }

    .search-bar input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px 16px 12px 42px;
      font-size: 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 85, 0, 0.1);
    }

    .search-bar input::placeholder {
      color: #555;
    }

    .search-bar .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      pointer-events: none;
      transition: color 0.2s;
    }

    .search-bar input:focus~.search-icon {
      color: var(--accent);
    }

    .search-bar .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      display: none;
      transition: color 0.15s;
    }

    .search-bar .search-clear:hover {
      color: var(--text);
    }

    .search-bar.has-value .search-clear {
      display: block;
    }

    .no-results {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
      display: none;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
      opacity: 0.3;
      margin: 64px 0;
    }


    /* Loading / error states */
    .manifest-status {
      text-align: center;
      padding: 40px 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
    }

    .manifest-status.error {
      color: #ff4444;
    }

    .manifest-status.loading {
      color: var(--text-muted);
    }

    /* Footer */
    footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Toolbar: nav + sort */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .toolbar-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-link,
    .browse-toggle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .nav-link:hover,
    .browse-toggle:hover {
      color: var(--text);
    }

    .nav-link.active {
      color: var(--accent);
      border-color: var(--border);
      background: #1a1a1a;
    }

    .toolbar-sort {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-sort label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .toolbar-sort select {
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
    }

    .toolbar-sort select:focus {
      border-color: var(--accent);
    }

    /* Browse panel (tags + artists) */
    .browse-panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 20px;
    }

    .browse-group + .browse-group {
      margin-top: 16px;
    }

    .browse-group-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chip-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .chip:hover .chip-count {
      color: var(--accent);
    }

    /* Search helper line */
    .search-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin: -14px 0 24px 2px;
    }

    /* View heading / breadcrumb */
    .view-heading {
      margin-bottom: 22px;
    }

    .back-link {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
      color: var(--accent);
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .view-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 8px;
    }

    .view-title .view-title-kind {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 400;
      display: block;
      margin-bottom: 4px;
    }

    /* Tracks database list */
    .track-list {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .track-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 16px;
      text-decoration: none;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    .track-row:last-child {
      border-bottom: none;
    }

    .track-row:hover {
      background: #1a1a1a;
    }

    .track-row-main {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
    }

    .track-row .track-artist {
      color: var(--text);
    }

    .track-row .track-sep {
      color: var(--text-muted);
      margin: 0 4px;
    }

    .track-row .track-title {
      color: var(--text-muted);
    }

    .track-row-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .mix-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }

    .buy-dot {
      color: var(--accent);
      font-size: 13px;
    }

    /* Track detail header */
    .track-detail-head {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px 24px;
      margin-bottom: 40px;
    }

    .track-detail-kind {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .track-detail-title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .track-detail-artist {
      font-size: 16px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .buy-btn {
      display: inline-block;
      margin-top: 20px;
      background: var(--accent);
      color: #111;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      transition: filter 0.15s;
    }

    .buy-btn:hover {
      filter: brightness(1.1);
    }

    .bandcamp-embed-wrap {
      margin-top: 24px;
    }

    .bandcamp-embed {
      border: 0;
      width: 100%;
      max-width: 400px;
      height: 120px;
    }

    .empty-note {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
    }
  </style>
</head>

<body>
  <div class="page">

    <header class="site-header">
      <span class="logo">Off Grid</span>
      <h1 class="site-title">The <strong>Mixes</strong></h1>
      <p class="site-tagline">Self hosted embedded audio player for DJ mixes and playlists.</p>
      <div class="accent-line"></div>
    </header>

    <!-- Toolbar: nav + sort -->
    <nav class="toolbar" id="toolbar">
      <div class="toolbar-nav">
        <a href="#/" class="nav-link" data-nav="home">Mixes</a>
        <a href="#/playlists" class="nav-link" data-nav="playlists">Playlists</a>
        <a href="#/tracks" class="nav-link" data-nav="tracks">Tracks</a>
        <button class="browse-toggle" id="browse-toggle" type="button">Browse &#9662;</button>
      </div>
      <div class="toolbar-sort" id="toolbar-sort">
        <label for="sort-select">Sort</label>
        <select id="sort-select">
          <option value="default">Newest</option>
          <option value="title">Title A&ndash;Z</option>
          <option value="artist">Artist A&ndash;Z</option>
        </select>
      </div>
    </nav>

    <!-- Browse panel: artists + tags -->
    <div class="browse-panel" id="browse-panel" hidden>
      <div class="browse-group" id="artist-group">
        <div class="browse-group-label">Artists</div>
        <div class="chip-row" id="artist-chips"></div>
      </div>
      <div class="browse-group" id="tag-group">
        <div class="browse-group-label">Tags</div>
        <div class="chip-row" id="tag-chips"></div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-bar" id="search-bar">
      <input type="text" id="mix-search" placeholder="Search mixes &mdash; title, artist, tag, or track name..."
        autocomplete="off">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <button class="search-clear" id="search-clear">&times;</button>
    </div>
    <p class="search-hint" id="search-hint">Searches mix titles, artists, tags, and the track names inside each mix.
    </p>

    <!-- View heading / breadcrumb (filtered views) -->
    <div class="view-heading" id="view-heading" hidden></div>

    <!-- Main view (router fills this) -->
    <div id="main-view">
      <div class="manifest-status loading" id="manifest-loading">Loading mixes...</div>
    </div>

    <footer>
      <span>Off Grid &mdash; Self-hosted audio</span>
      <span>Powered by <a href="https://wavesurfer.xyz">WaveSurfer.js</a> + <a
          href="https://developers.cloudflare.com/r2/">Cloudflare R2</a></span>
    </footer>

  </div>

  <!-- Load the web component -->
  <script src="audio-player.js"></script>

  <!-- Optional local override (gitignored): copy config.local.example.js to
       config.local.js and set window.OFFGRID_MANIFEST_URL. Harmless 404 if absent. -->
  <script src="config.local.js"></script>

  <!-- Load manifest and render players dynamically -->
  <script>
    // ---------------------------------------------------------------------
    // Manifest URL, resolved in order:
    //   1. ?manifest=<url>             (explicit, any manifest)
    //   2. ?user=<id>                  (a user's library: <r2 base>/users/<id>/data/manifest.json)
    //   3. window.OFFGRID_MANIFEST_URL (from gitignored config.local.js)
    //   4. the placeholder below       (edit only for a committed default)
    //
    // In-page navigation uses hash routes (orthogonal to the params above):
    //   #/                home — all mixes (sortable) + playlists
    //   #/playlists       just the playlists
    //   #/mix/<slug>      one mix by its id/slug (in-app, with a back link)
    //   #/tag/<tag>       mixes carrying a tag
    //   #/artist/<name>   mixes by an artist (the "user" page)
    //   #/tracks          unique tracks across all mixes (searchable)
    //   #/track/<slug>    one track + its buy link + every mix containing it
    //
    // Query param: ?tracklist=open renders every player with its tracklist open.
    // ---------------------------------------------------------------------
    const _params = new URLSearchParams(location.search);
    // R2 base for ?user= — explicit OFFGRID_R2_BASE, else derived from the
    // configured manifest URL by stripping the /data/manifest.json suffix.
    const _r2Base = window.OFFGRID_R2_BASE
      || (window.OFFGRID_MANIFEST_URL || '').replace(/\/data\/manifest\.json$/, '');
    const _userId = _params.get('user');
    const _mixId = _params.get('mix'); // optional: show just this one mix
    // ?tracklist=open|1|true → render every player with its tracklist expanded
    const _openTracklist = ['open', '1', 'true'].includes((_params.get('tracklist') || '').toLowerCase());
    const MANIFEST_URL =
      _params.get('manifest')
      || (_userId && _r2Base ? `${_r2Base}/users/${encodeURIComponent(_userId)}/data/manifest.json` : '')
      || window.OFFGRID_MANIFEST_URL
      || 'https://pub-xxxxxxxx.r2.dev/data/manifest.json';

    // Optional Worker base URL (gitignored config.local.js). When set, the
    // track page resolves Bandcamp links into inline embeds via the Worker's
    // public /api/bandcamp-embed endpoint. Unset → embeds are skipped silently.
    const API_BASE = (window.OFFGRID_API_BASE || '').replace(/\/+$/, '');

    // ---- App state ------------------------------------------------------
    const state = {
      site: {},
      mixes: [],
      playlists: [],
      mixMap: new Map(),       // id -> mix
      artistIndex: new Map(),  // artist -> [mix]
      tagIndex: new Map(),     // tag -> [mix]
      trackIndex: new Map(),   // slug -> { slug, artist, title, url, mixIds:Set }
      sort: 'default',
      singleMix: false,
    };
    let activeFilter = null;   // current view's search handler: (query) => void

    // ---- Helpers --------------------------------------------------------
    const view = () => document.getElementById('main-view');

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function slugify(s) {
      return String(s || '').toLowerCase().trim()
        .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'untitled';
    }

    function makePlayer(mix, startSeconds) {
      const div = document.createElement('div');
      div.className = 'player-entry';
      div.dataset.title = (mix.title || '').toLowerCase();
      div.dataset.artist = (mix.artist || '').toLowerCase();
      div.dataset.tags = (mix.tags || []).join(',').toLowerCase();
      div.dataset.tracks = (mix.tracks || [])
        .map(t => `${t.artist || ''} ${t.title || ''}`).join(' ').toLowerCase();

      const player = document.createElement('offgrid-player');
      player.setAttribute('src', mix.src);
      player.setAttribute('title', mix.title);
      if (mix.artist) player.setAttribute('artist', mix.artist);
      if (mix.thumb) player.setAttribute('thumb', mix.thumb);
      if (mix.peaks) player.setAttribute('peaks', mix.peaks);
      if (mix.color) player.setAttribute('color', mix.color);
      if (mix.description) player.setAttribute('description', mix.description);
      if (mix.tags && mix.tags.length > 0) player.setAttribute('tags', JSON.stringify(mix.tags));
      if (_openTracklist) player.setAttribute('open-tracklist', '');
      if (Number.isFinite(startSeconds) && startSeconds > 0) {
        player.setAttribute('start-at', String(startSeconds));
      }
      if (mix.tracks && mix.tracks.length > 0) player.tracks = mix.tracks;

      div.appendChild(player);
      return div;
    }

    function sortMixes(mixes) {
      const arr = mixes.slice();
      if (state.sort === 'title') {
        arr.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
      } else if (state.sort === 'artist') {
        arr.sort((a, b) => (a.artist || '').localeCompare(b.artist || ''));
      } else { // 'default' = newest by releaseDate desc; undated rows keep manifest order
        arr.sort((a, b) => {
          const da = a.releaseDate || '', db = b.releaseDate || '';
          if (da && db) return db.localeCompare(da);
          if (da) return -1;
          if (db) return 1;
          return 0;
        });
      }
      return arr;
    }

    // ---- Index building -------------------------------------------------
    function buildIndexes() {
      state.mixMap = new Map(state.mixes.map(m => [m.id, m]));
      state.artistIndex = new Map();
      state.tagIndex = new Map();
      state.trackIndex = new Map();

      for (const mix of state.mixes) {
        const artist = (mix.artist || '').trim();
        if (artist) {
          if (!state.artistIndex.has(artist)) state.artistIndex.set(artist, []);
          state.artistIndex.get(artist).push(mix);
        }
        for (const tag of (mix.tags || [])) {
          if (!state.tagIndex.has(tag)) state.tagIndex.set(tag, []);
          state.tagIndex.get(tag).push(mix);
        }
        // No shared track entity in the data model — build one client-side by
        // matching normalized artist+title across every mix's tracklist.
        for (const t of (mix.tracks || [])) {
          const artistT = (t.artist || '').trim();
          const titleT = (t.title || '').trim();
          if (!artistT && !titleT) continue;
          const slug = slugify(`${artistT} ${titleT}`);
          let entry = state.trackIndex.get(slug);
          if (!entry) {
            entry = { slug, artist: artistT, title: titleT, url: '', mixIds: new Set() };
            state.trackIndex.set(slug, entry);
          }
          if (!entry.url && t.url) entry.url = t.url; // first non-empty buy link wins
          entry.mixIds.add(mix.id);
        }
      }
    }

    function populateChips() {
      const artistChips = document.getElementById('artist-chips');
      const tagChips = document.getElementById('tag-chips');
      artistChips.innerHTML = '';
      tagChips.innerHTML = '';

      const artists = [...state.artistIndex.entries()].sort((a, b) => a[0].localeCompare(b[0]));
      for (const [name, mixes] of artists) {
        const a = document.createElement('a');
        a.className = 'chip';
        a.href = '#/artist/' + encodeURIComponent(name);
        a.innerHTML = `${esc(name)} <span class="chip-count">${mixes.length}</span>`;
        artistChips.appendChild(a);
      }
      document.getElementById('artist-group').hidden = artists.length === 0;

      const tags = [...state.tagIndex.entries()].sort((a, b) => a[0].localeCompare(b[0]));
      for (const [tag, mixes] of tags) {
        const a = document.createElement('a');
        a.className = 'chip';
        a.href = '#/tag/' + encodeURIComponent(tag);
        a.innerHTML = `${esc(tag)} <span class="chip-count">${mixes.length}</span>`;
        tagChips.appendChild(a);
      }
      document.getElementById('tag-group').hidden = tags.length === 0;

      // Nothing to browse → hide the toggle entirely
      document.getElementById('browse-toggle').hidden = artists.length === 0 && tags.length === 0;
    }

    // ---- Chrome visibility ----------------------------------------------
    function showChrome({ sort = false, browse = false, search = null, heading = null }) {
      document.getElementById('toolbar').style.display = state.singleMix ? 'none' : '';
      document.getElementById('toolbar-sort').style.display = sort ? '' : 'none';
      if (sort) document.getElementById('sort-select').value = state.sort;

      const browseBtn = document.getElementById('browse-toggle');
      browseBtn.style.display = browse ? '' : 'none';
      if (!browse) document.getElementById('browse-panel').hidden = true;

      const sb = document.getElementById('search-bar');
      const hint = document.getElementById('search-hint');
      const input = document.getElementById('mix-search');
      if (search) {
        sb.style.display = '';
        hint.style.display = '';
        input.value = '';
        sb.classList.remove('has-value');
        if (search === 'tracks') {
          input.placeholder = 'Search tracks by artist or title...';
          hint.textContent = 'Searches track artists and titles.';
        } else {
          input.placeholder = 'Search mixes — title, artist, tag, or track name...';
          hint.textContent = 'Searches mix titles, artists, tags, and the track names inside each mix.';
        }
      } else {
        sb.style.display = 'none';
        hint.style.display = 'none';
      }

      const hb = document.getElementById('view-heading');
      if (heading) {
        hb.hidden = false;
        const back = heading.back
          ? `<a href="${heading.back}" class="back-link">&larr; ${esc(heading.backText || 'Back')}</a>` : '';
        const title = heading.kind
          ? `<div class="view-title"><span class="view-title-kind">${esc(heading.kind)}</span>${esc(heading.title)}</div>`
          : '';
        hb.innerHTML = back + title;
      } else {
        hb.hidden = true;
      }

      const activeNav = (heading && heading.nav) || 'home';
      document.querySelectorAll('.nav-link').forEach(el => {
        el.classList.toggle('active', el.dataset.nav === activeNav);
      });
    }

    // ---- Search wiring (context-aware) ----------------------------------
    function setMixFilter(stack, noResults) {
      activeFilter = (q) => {
        let visible = 0;
        stack.querySelectorAll('.player-entry').forEach(entry => {
          const match = !q
            || entry.dataset.title.includes(q)
            || entry.dataset.artist.includes(q)
            || entry.dataset.tags.includes(q)
            || entry.dataset.tracks.includes(q);
          entry.style.display = match ? '' : 'none';
          if (match) visible++;
        });
        if (noResults) noResults.style.display = (visible === 0 && q) ? 'block' : 'none';
      };
    }

    function setTrackFilter(list, noResults) {
      activeFilter = (q) => {
        let visible = 0;
        list.querySelectorAll('.track-row').forEach(row => {
          const match = !q || row.dataset.search.includes(q);
          row.style.display = match ? '' : 'none';
          if (match) visible++;
        });
        if (noResults) noResults.style.display = (visible === 0 && q) ? 'block' : 'none';
      };
    }

    // ---- View renderers -------------------------------------------------
    function sectionEl(label) {
      const section = document.createElement('section');
      section.className = 'section';
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = label;
      section.appendChild(lbl);
      return section;
    }

    function noResultsEl() {
      const nr = document.createElement('div');
      nr.className = 'no-results';
      nr.textContent = 'Nothing matches your search.';
      return nr;
    }

    function renderMixList(mixes, { label, withPlaylists = false }) {
      const root = view();
      root.innerHTML = '';
      const section = sectionEl(`${label} · ${mixes.length}`);
      const stack = document.createElement('div');
      stack.className = 'player-stack';
      sortMixes(mixes).forEach(m => stack.appendChild(makePlayer(m)));
      const nr = noResultsEl();
      if (mixes.length) {
        section.appendChild(stack);
        section.appendChild(nr);
      } else {
        const note = document.createElement('div');
        note.className = 'empty-note';
        note.textContent = 'No mixes here.';
        section.appendChild(note);
      }
      root.appendChild(section);
      if (withPlaylists) renderPlaylists(root);
      setMixFilter(stack, nr);
    }

    function renderPlaylists(root) {
      for (const pl of state.playlists) {
        const section = sectionEl(pl.title);
        const playlist = document.createElement('offgrid-playlist');
        playlist.setAttribute('color', pl.color || state.site.accent || '#ff5500');
        if (pl.creator) playlist.setAttribute('artist', pl.creator);
        const tracks = (pl.mixIds || [])
          .map(id => state.mixMap.get(id))
          .filter(Boolean)
          .map(m => ({ src: m.src, title: m.title, artist: m.artist, thumb: m.thumb, peaks: m.peaks }));
        playlist.tracks = tracks;
        section.appendChild(playlist);
        root.appendChild(section);
      }
    }

    function renderHome() {
      showChrome({ sort: true, browse: true, search: 'mixes', heading: null });
      renderMixList(state.mixes, { label: 'Mixes', withPlaylists: true });
    }

    function renderMixDetail(id) {
      const mix = state.mixMap.get(id);
      showChrome({
        sort: false, browse: false, search: null,
        heading: { back: '#/', backText: 'All mixes', kind: 'Mix', title: mix ? mix.title : id, nav: 'home' },
      });
      const root = view();
      root.innerHTML = '';
      if (!mix) {
        const note = document.createElement('div');
        note.className = 'manifest-status error';
        note.textContent = 'Mix not found.';
        root.appendChild(note);
        activeFilter = null;
        return;
      }
      root.appendChild(makePlayer(mix));
      activeFilter = null;
    }

    function renderPlaylistsView() {
      showChrome({
        sort: false, browse: false, search: null,
        heading: { back: '#/', backText: 'All mixes', nav: 'playlists' },
      });
      const root = view();
      root.innerHTML = '';
      if (!state.playlists.length) {
        const note = document.createElement('div');
        note.className = 'empty-note';
        note.textContent = 'No playlists in this library yet.';
        root.appendChild(note);
      } else {
        renderPlaylists(root);
      }
      activeFilter = null;
    }

    function renderTag(tag) {
      showChrome({
        sort: true, browse: true, search: 'mixes',
        heading: { back: '#/', backText: 'All mixes', kind: 'Tag', title: tag, nav: 'home' },
      });
      renderMixList(state.tagIndex.get(tag) || [], { label: 'Mixes' });
    }

    function renderArtist(name) {
      showChrome({
        sort: true, browse: true, search: 'mixes',
        heading: { back: '#/', backText: 'All mixes', kind: 'Artist', title: name, nav: 'home' },
      });
      renderMixList(state.artistIndex.get(name) || [], { label: 'Mixes' });
    }

    function renderTracks() {
      showChrome({
        sort: false, browse: false, search: 'tracks',
        heading: { back: '#/', backText: 'All mixes', nav: 'tracks' },
      });
      const root = view();
      root.innerHTML = '';
      const tracks = [...state.trackIndex.values()].sort((a, b) =>
        (a.artist || '').localeCompare(b.artist || '') || (a.title || '').localeCompare(b.title || ''));
      const section = sectionEl(`Tracks · ${tracks.length}`);
      if (!tracks.length) {
        const note = document.createElement('div');
        note.className = 'empty-note';
        note.textContent = 'No track data in this library yet.';
        section.appendChild(note);
        root.appendChild(section);
        activeFilter = null;
        return;
      }
      const list = document.createElement('div');
      list.className = 'track-list';
      for (const t of tracks) {
        const a = document.createElement('a');
        a.className = 'track-row';
        a.href = '#/track/' + encodeURIComponent(t.slug);
        a.dataset.search = `${t.artist} ${t.title}`.toLowerCase();
        const n = t.mixIds.size;
        a.innerHTML =
          `<span class="track-row-main"><span class="track-artist">${esc(t.artist || 'Unknown')}</span>` +
          `<span class="track-sep">—</span><span class="track-title">${esc(t.title || 'Untitled')}</span></span>` +
          `<span class="track-row-meta">${t.url ? '<span class="buy-dot" title="Has buy link">↗</span>' : ''}` +
          `<span class="mix-count">${n} mix${n === 1 ? '' : 'es'}</span></span>`;
        list.appendChild(a);
      }
      section.appendChild(list);
      const nr = noResultsEl();
      section.appendChild(nr);
      root.appendChild(section);
      setTrackFilter(list, nr);
    }

    function renderTrackDetail(slug) {
      const t = state.trackIndex.get(slug);
      showChrome({
        sort: false, browse: false, search: null,
        heading: { back: '#/tracks', backText: 'Tracks', nav: 'tracks' },
      });
      const root = view();
      root.innerHTML = '';
      if (!t) {
        const note = document.createElement('div');
        note.className = 'manifest-status error';
        note.textContent = 'Track not found.';
        root.appendChild(note);
        activeFilter = null;
        return;
      }
      const head = document.createElement('div');
      head.className = 'track-detail-head';
      head.innerHTML =
        `<div class="track-detail-kind">Track</div>` +
        `<div class="track-detail-title">${esc(t.title || 'Untitled')}</div>` +
        `<div class="track-detail-artist">${esc(t.artist || 'Unknown artist')}</div>`;
      if (t.url) {
        const buy = document.createElement('a');
        buy.className = 'buy-btn';
        buy.href = t.url;
        buy.target = '_blank';
        buy.rel = 'noopener';
        buy.textContent = 'Buy / View ↗';
        head.appendChild(buy);
      }
      root.appendChild(head);

      // If the buy link is a Bandcamp page, render its embedded player too
      // (in addition to the Buy / View button). Resolved lazily via the Worker.
      if (t.url && isBandcampUrl(t.url) && API_BASE) {
        renderBandcampEmbed(root, t.url);
      }

      const mixes = [...t.mixIds].map(id => state.mixMap.get(id)).filter(Boolean);
      const section = sectionEl(`Appears in · ${mixes.length} mix${mixes.length === 1 ? '' : 'es'}`);
      const stack = document.createElement('div');
      stack.className = 'player-stack';
      mixes.forEach(m => {
        // Cue each mix to the moment this track appears in it (per-mix — the
        // same track can sit at different times across mixes).
        const start = trackSecondsInMix(m, slug);
        stack.appendChild(makePlayer(m, start));
      });
      section.appendChild(stack);
      root.appendChild(section);
      activeFilter = null;
    }

    // Seconds at which the track identified by `slug` appears in `mix`, or
    // undefined. Matches on the same normalized artist+title used by the index.
    function trackSecondsInMix(mix, slug) {
      for (const tr of (mix.tracks || [])) {
        const s = slugify(`${(tr.artist || '').trim()} ${(tr.title || '').trim()}`);
        if (s === slug && Number.isFinite(tr.seconds)) return tr.seconds;
      }
      return undefined;
    }

    function isBandcampUrl(u) {
      try {
        const host = new URL(u).hostname.toLowerCase();
        return host === 'bandcamp.com' || host.endsWith('.bandcamp.com');
      } catch (e) { return false; }
    }

    // Fetch the embed URL from the Worker and insert a Bandcamp iframe. Fails
    // silently — the Buy / View button already covers the no-embed case.
    async function renderBandcampEmbed(root, url) {
      const wrap = document.createElement('div');
      wrap.className = 'bandcamp-embed-wrap';
      root.appendChild(wrap);
      try {
        const resp = await fetch(`${API_BASE}/api/bandcamp-embed?url=${encodeURIComponent(url)}`);
        if (!resp.ok) { wrap.remove(); return; }
        const data = await resp.json();
        if (!data || !data.embedUrl) { wrap.remove(); return; }
        const frame = document.createElement('iframe');
        frame.className = 'bandcamp-embed';
        frame.src = data.embedUrl;
        frame.loading = 'lazy';
        frame.setAttribute('seamless', '');
        const link = document.createElement('a');
        link.href = url;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = 'Listen on Bandcamp';
        frame.appendChild(link);
        wrap.appendChild(frame);
      } catch (e) {
        wrap.remove();
      }
    }

    function renderSingleMix() {
      showChrome({}); // singleMix flag hides the toolbar; everything else off
      const root = view();
      root.innerHTML = '';
      const mix = state.mixes[0];
      if (!mix) {
        root.innerHTML = '<div class="manifest-status error">Mix not found.</div>';
        return;
      }
      root.appendChild(makePlayer(mix));
      activeFilter = null;
    }

    // ---- SEO: per-view meta tags + JSON-LD ------------------------------
    // Canonical/absolute-URL base: an explicit window.OFFGRID_SITE_URL (set in
    // config.local.js) pins the real public domain; otherwise we derive it from
    // wherever the page is being served.
    const SITE_BASE = (window.OFFGRID_SITE_URL || (location.origin + location.pathname)).replace(/\/+$/, '');
    function siteUrl(suffix) { return SITE_BASE + (suffix || ''); }
    function mixPageUrl(id) { return siteUrl('?mix=' + encodeURIComponent(id)); }

    function _abs(u) {
      if (!u) return '';
      if (/^https?:\/\//i.test(u)) return u;
      try { return new URL(u, SITE_BASE).href; } catch (e) { return u; }
    }
    // Seconds → ISO 8601 duration (PT#H#M#S); '' when unknown/zero.
    function _isoDuration(sec) {
      sec = Math.round(Number(sec) || 0);
      if (sec <= 0) return '';
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      return 'PT' + (h ? h + 'H' : '') + (m ? m + 'M' : '') + (s ? s + 'S' : '');
    }
    function _encFmt(src) {
      const ext = (src || '').split('?')[0].split('#')[0].split('.').pop().toLowerCase();
      return { mp3: 'audio/mpeg', wav: 'audio/wav', ogg: 'audio/ogg', oga: 'audio/ogg',
        m4a: 'audio/mp4', aac: 'audio/aac', flac: 'audio/flac', opus: 'audio/opus' }[ext] || '';
    }

    function _setMeta(attr, key, content) {
      let el = document.head.querySelector(`meta[${attr}="${key}"]`);
      if (!content) { if (el) el.remove(); return; }
      if (!el) { el = document.createElement('meta'); el.setAttribute(attr, key); document.head.appendChild(el); }
      el.setAttribute('content', content);
    }
    function _setCanonical(url) {
      let el = document.head.querySelector('link[rel="canonical"]');
      if (!el) { el = document.createElement('link'); el.setAttribute('rel', 'canonical'); document.head.appendChild(el); }
      el.setAttribute('href', url);
    }
    function _setJsonLd(obj) {
      let el = document.getElementById('ld-json');
      if (!el) { el = document.createElement('script'); el.type = 'application/ld+json'; el.id = 'ld-json'; document.head.appendChild(el); }
      el.textContent = obj ? JSON.stringify(obj, null, 2) : '';
    }

    // ---- JSON-LD builders ----
    function mixRef(m) {
      const o = { '@type': 'MusicRecording', name: m.title, url: mixPageUrl(m.id) };
      if (m.artist) o.byArtist = { '@type': 'MusicGroup', name: m.artist };
      if (m.thumb) o.image = _abs(m.thumb);
      return o;
    }
    // Full MusicRecording for a single mix: AudioObject embed + ItemList tracklist.
    function mixJsonLd(mix) {
      const page = mixPageUrl(mix.id);
      const o = { '@context': 'https://schema.org', '@type': 'MusicRecording', '@id': page + '#mix', name: mix.title, url: page };
      if (mix.artist) o.byArtist = { '@type': 'MusicGroup', name: mix.artist };
      if (mix.releaseDate) o.datePublished = mix.releaseDate;
      const dur = _isoDuration(mix.duration);
      if (dur) o.duration = dur;
      if (mix.tags && mix.tags.length) o.genre = mix.tags;
      if (mix.thumb) o.image = _abs(mix.thumb);
      if (mix.description) o.description = mix.description;
      if (mix.src) {
        const audio = { '@type': 'AudioObject', contentUrl: _abs(mix.src), embedUrl: page };
        const fmt = _encFmt(mix.src); if (fmt) audio.encodingFormat = fmt;
        if (dur) audio.duration = dur;
        o.audio = audio;
      }
      const tracks = mix.tracks || [];
      if (tracks.length) {
        o.track = {
          '@type': 'ItemList', numberOfItems: tracks.length,
          itemListElement: tracks.map((t, i) => {
            const rec = { '@type': 'MusicRecording', name: t.title || 'Untitled' };
            if (t.artist) rec.byArtist = { '@type': 'MusicGroup', name: t.artist };
            if (/^https?:\/\//i.test(t.url || '')) rec.url = t.url;
            return { '@type': 'ListItem', position: i + 1, item: rec };
          }),
        };
      }
      return o;
    }
    function trackJsonLd(t, mixes, page) {
      const o = { '@context': 'https://schema.org', '@type': 'MusicRecording', '@id': page + '#track',
        name: t.title || 'Untitled', url: /^https?:\/\//i.test(t.url || '') ? t.url : page };
      if (t.artist) o.byArtist = { '@type': 'MusicGroup', name: t.artist };
      if (mixes.length) o.isPartOf = mixes.map(m => ({ '@type': 'MusicRecording', name: m.title, url: mixPageUrl(m.id) }));
      return o;
    }
    function collectionJsonLd(name, url, description, mixes) {
      return { '@context': 'https://schema.org', '@type': 'CollectionPage', name, url,
        ...(description ? { description } : {}),
        mainEntity: { '@type': 'ItemList', numberOfItems: mixes.length,
          itemListElement: mixes.map((m, i) => ({ '@type': 'ListItem', position: i + 1, item: mixRef(m) })) } };
    }
    function artistJsonLd(name, url, mixes) {
      const o = { '@context': 'https://schema.org', '@type': 'MusicGroup', '@id': url + '#artist', name, url };
      if (mixes.length) o.track = mixes.map(mixRef);
      return o;
    }
    function tracksJsonLd(tracks, url, description) {
      return { '@context': 'https://schema.org', '@type': 'CollectionPage', name: 'Tracks', url, description,
        mainEntity: { '@type': 'ItemList', numberOfItems: tracks.length,
          itemListElement: tracks.map((t, i) => {
            const rec = { '@type': 'MusicRecording', name: t.title || 'Untitled', url: siteUrl('#/track/' + encodeURIComponent(t.slug)) };
            if (t.artist) rec.byArtist = { '@type': 'MusicGroup', name: t.artist };
            return { '@type': 'ListItem', position: i + 1, item: rec };
          }) } };
    }
    function playlistsJsonLd(playlists, url, description) {
      return { '@context': 'https://schema.org', '@type': 'CollectionPage', name: 'Playlists', url, description,
        mainEntity: { '@type': 'ItemList', numberOfItems: playlists.length,
          itemListElement: playlists.map((pl, i) => ({ '@type': 'ListItem', position: i + 1,
            item: { '@type': 'MusicPlaylist', name: pl.title, numTracks: (pl.mixIds || []).length,
              ...(pl.creator ? { author: { '@type': 'MusicGroup', name: pl.creator } } : {}) } })) } };
    }

    function applySEO(d, siteName) {
      document.title = d.title;
      _setMeta('name', 'description', d.description);
      _setCanonical(d.canonical);
      _setMeta('property', 'og:site_name', siteName);
      _setMeta('property', 'og:title', d.title);
      _setMeta('property', 'og:description', d.description);
      _setMeta('property', 'og:type', d.ogType || 'website');
      _setMeta('property', 'og:url', d.canonical);
      _setMeta('property', 'og:image', d.image);
      _setJsonLd(d.jsonld);
    }

    // Derive the descriptor for the current route and apply it.
    function updateSEO(r) {
      const siteName = state.site.title || 'Off Grid';
      const tagline = state.site.tagline || 'Self hosted embedded audio player for DJ mixes and playlists.';
      const firstThumb = (list) => { const m = list.find(x => x && x.thumb); return m ? _abs(m.thumb) : ''; };
      let title, description, ogType = 'website', image = '', canonical = siteUrl(), jsonld = null;

      if (r.view === 'mix') {
        const mix = state.mixMap.get(r.arg);
        if (mix) {
          const who = mix.artist ? ` by ${mix.artist}` : '';
          title = `${mix.title}${who} — ${siteName}`;
          description = mix.description || `${mix.title}${who}.`;
          ogType = 'music.song';
          image = mix.thumb ? _abs(mix.thumb) : '';
          canonical = mixPageUrl(mix.id);
          jsonld = mixJsonLd(mix);
        } else { title = `Mix not found — ${siteName}`; description = tagline; }
      } else if (r.view === 'track') {
        const t = state.trackIndex.get(r.arg);
        if (t) {
          const mixes = [...t.mixIds].map(id => state.mixMap.get(id)).filter(Boolean);
          const who = t.artist ? ` by ${t.artist}` : '';
          title = `${t.title || 'Untitled'}${who} — ${siteName}`;
          description = `${t.title || 'Untitled'}${who}, featured in ${mixes.length} mix${mixes.length === 1 ? '' : 'es'}.`;
          ogType = 'music.song';
          image = firstThumb(mixes);
          canonical = siteUrl('#/track/' + encodeURIComponent(t.slug));
          jsonld = trackJsonLd(t, mixes, canonical);
        } else { title = `Track not found — ${siteName}`; description = tagline; }
      } else if (r.view === 'tag') {
        const mixes = state.tagIndex.get(r.arg) || [];
        title = `Tag: ${r.arg} — ${siteName}`;
        description = `Mixes tagged “${r.arg}” (${mixes.length}).`;
        canonical = siteUrl('#/tag/' + encodeURIComponent(r.arg));
        image = firstThumb(mixes);
        jsonld = collectionJsonLd(`Tag: ${r.arg}`, canonical, description, mixes);
      } else if (r.view === 'artist') {
        const mixes = state.artistIndex.get(r.arg) || [];
        title = `${r.arg} — ${siteName}`;
        description = `Mixes by ${r.arg} (${mixes.length}).`;
        ogType = 'profile';
        canonical = siteUrl('#/artist/' + encodeURIComponent(r.arg));
        image = firstThumb(mixes);
        jsonld = artistJsonLd(r.arg, canonical, mixes);
      } else if (r.view === 'tracks') {
        const tracks = [...state.trackIndex.values()];
        title = `Tracks — ${siteName}`;
        description = `Every track across the mixes (${tracks.length}).`;
        canonical = siteUrl('#/tracks');
        jsonld = tracksJsonLd(tracks, canonical, description);
      } else if (r.view === 'playlists') {
        title = `Playlists — ${siteName}`;
        description = `Playlists in this library (${state.playlists.length}).`;
        canonical = siteUrl('#/playlists');
        jsonld = playlistsJsonLd(state.playlists, canonical, description);
      } else { // home
        title = `${siteName} — Mixes`;
        description = tagline;
        canonical = siteUrl();
        image = firstThumb(state.mixes);
        jsonld = collectionJsonLd(siteName, canonical, description, state.mixes);
      }
      applySEO({ title, description, ogType, image, canonical, jsonld }, siteName);
    }

    // ---- Router ---------------------------------------------------------
    function parseHash() {
      const raw = location.hash.replace(/^#\/?/, '');
      if (!raw) return { view: 'home' };
      const slash = raw.indexOf('/');
      const seg = slash === -1 ? raw : raw.slice(0, slash);
      const arg = slash === -1 ? '' : decodeURIComponent(raw.slice(slash + 1));
      if (seg === 'playlists') return { view: 'playlists' };
      if (seg === 'mix') return { view: 'mix', arg };
      if (seg === 'tracks') return { view: 'tracks' };
      if (seg === 'track') return { view: 'track', arg };
      if (seg === 'tag') return { view: 'tag', arg };
      if (seg === 'artist') return { view: 'artist', arg };
      return { view: 'home' };
    }

    function render() {
      if (state.singleMix) {
        renderSingleMix();
        updateSEO({ view: 'mix', arg: (state.mixes[0] || {}).id });
        return;
      }
      const r = parseHash();
      if (r.view === 'playlists') renderPlaylistsView();
      else if (r.view === 'mix') renderMixDetail(r.arg);
      else if (r.view === 'tracks') renderTracks();
      else if (r.view === 'track') renderTrackDetail(r.arg);
      else if (r.view === 'tag') renderTag(r.arg);
      else if (r.view === 'artist') renderArtist(r.arg);
      else renderHome();
      updateSEO(r);
    }

    // ---- Manifest load --------------------------------------------------
    (async function loadManifest() {
      const loadingEl = document.getElementById('manifest-loading');
      try {
        const resp = await fetch(MANIFEST_URL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        state.site = data.site || {};
        state.mixes = data.mixes || [];
        state.playlists = data.playlists || [];

        // Single-mix mode (?mix=<id>): show just that mix, no chrome.
        if (_mixId) {
          const one = state.mixes.find(m => m.id === _mixId);
          if (!one) {
            if (loadingEl) { loadingEl.className = 'manifest-status error'; loadingEl.textContent = 'Mix not found.'; }
            return;
          }
          state.mixes = [one];
          state.playlists = [];
          state.singleMix = true;
        }

        window._mixes = state.mixes; // back-compat for any external probes
        buildIndexes();
        if (!state.singleMix) populateChips();
        render();
      } catch (err) {
        console.error('Failed to load manifest:', err);
        if (loadingEl) {
          loadingEl.className = 'manifest-status error';
          loadingEl.textContent = 'Failed to load mix data.';
        }
      }
    })();

    // ---- Global wiring --------------------------------------------------
    window.addEventListener('hashchange', render);

    // Single search box drives the active view's filter
    (function initSearchBox() {
      const input = document.getElementById('mix-search');
      const sb = document.getElementById('search-bar');
      const clr = document.getElementById('search-clear');
      input.addEventListener('input', () => {
        const q = input.value.toLowerCase().trim();
        sb.classList.toggle('has-value', q.length > 0);
        if (activeFilter) activeFilter(q);
      });
      clr.addEventListener('click', () => {
        input.value = '';
        input.dispatchEvent(new Event('input'));
        input.focus();
      });
    })();

    // Sort control re-renders the current view
    document.getElementById('sort-select').addEventListener('change', (e) => {
      state.sort = e.target.value;
      render();
    });

    // Browse toggle shows/hides the tag + artist panel
    document.getElementById('browse-toggle').addEventListener('click', () => {
      const panel = document.getElementById('browse-panel');
      panel.hidden = !panel.hidden;
    });

    // Click a tag pill inside any player → navigate to that tag view
    document.addEventListener('tagclick', (e) => {
      if (e.detail && e.detail.tag) location.hash = '#/tag/' + encodeURIComponent(e.detail.tag);
    });

    // Global play-one-at-a-time: pause any other player when one starts
    document.addEventListener('trackplay', (e) => {
      document.querySelectorAll('offgrid-player').forEach(p => {
        if (p !== e.target) p.pause();
      });
    });
  </script>
</body>

</html>
